name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: swift build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 真正的 Secrets.swift 不進版控(見 .gitignore);CI 用範本補一份佔位值即可編譯。
      - name: Provide placeholder Secrets.swift
        run: cp Secrets.example.swift Sources/UsageMeter/Secrets.swift

      - name: Build (debug)
        run: swift build

      # parsers + popover layout 回歸(高度縮放 / 不裁 header / 不裁右側)
      - name: Self-tests
        run: swift run UsageMeter --self-test

      - name: Build (release)
        run: swift build -c release

      - name: Self-tests (release binary)
        run: swift run -c release UsageMeter --self-test

  release:
    name: package release dmg
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # Secrets.swift 不進版控。Release 用 Actions secrets 注入 Antigravity OAuth client
      # (公開 desktop client,非個人帳密);未設定時退回 example 佔位符(Gemini refresh 會失敗)。
      - name: Provide Secrets.swift for release
        env:
          GEMINI_CLIENT_ID: ${{ secrets.GEMINI_CLIENT_ID }}
          GEMINI_CLIENT_SECRET: ${{ secrets.GEMINI_CLIENT_SECRET }}
        run: |
          cp Secrets.example.swift Sources/UsageMeter/Secrets.swift
          if [ -n "${GEMINI_CLIENT_ID:-}" ] && [ -n "${GEMINI_CLIENT_SECRET:-}" ]; then
            cat > Sources/UsageMeter/Secrets.swift <<EOF
          import Foundation
          enum Secrets {
              static let geminiClientID = "${GEMINI_CLIENT_ID}"
              static let geminiClientSecret = "${GEMINI_CLIENT_SECRET}"
          }
          EOF
            echo "Injected GEMINI_CLIENT_ID/SECRET from Actions secrets"
          else
            echo "WARNING: GEMINI_CLIENT_ID/SECRET not set; Gemini refresh will not work in this DMG"
          fi

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" ./make-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsageMeter-${{ github.ref_name }}
          path: UsageMeter-*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="UsageMeter-${GITHUB_REF_NAME#v}.dmg"
          NOTES="Self-signed macOS build. If Gatekeeper blocks first launch, open System Settings > Privacy & Security and choose Open Anyway."
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG" --title "UsageMeter $GITHUB_REF_NAME" --notes "$NOTES"
          fi
