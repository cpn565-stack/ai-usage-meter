# Release: package DMG → optional notarize → appcast → GitHub Release
#
# Triggers:
#   push tag v*        — full release (publish GitHub Release + commit appcast to main)
#   workflow_dispatch  — dry run: build DMG + signed appcast, upload artifact only
#
# Secrets (optional unless noted):
#   GEMINI_CLIENT_ID / GEMINI_CLIENT_SECRET  — Gemini OAuth in binary
#   SPARKLE_PRIVATE_KEY                      — EdDSA private key (file body; REQUIRED)
#   APPLE_CODESIGN_IDENTITY                  — Developer ID Application: …
#   BUILD_CERTIFICATE_BASE64 / P12_PASSWORD / KEYCHAIN_PASSWORD
#   APPLE_API_KEY_BASE64 / APPLE_API_KEY_ID / APPLE_API_ISSUER
#
# Note: never use `if: secrets.X != ''` — GitHub forbids secrets in if expressions.
#
# BUILD_NUMBER must be `git rev-list --count HEAD` (same as local package.sh),
# NOT github.run_number: Sparkle compares it against the installed CFBundleVersion,
# so it has to keep increasing across CI/local builds. Requires fetch-depth: 0.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: package + publish
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version + build number
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(git describe --tags --abbrev=0 | sed 's/^v//')-dev"
          fi
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"
          echo "version=${VERSION} build=${BUILD_NUMBER}"

      - name: Provide Secrets.swift
        env:
          GEMINI_CLIENT_ID: ${{ secrets.GEMINI_CLIENT_ID }}
          GEMINI_CLIENT_SECRET: ${{ secrets.GEMINI_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -n "${GEMINI_CLIENT_ID:-}" ] && [ -n "${GEMINI_CLIENT_SECRET:-}" ]; then
            {
              echo 'import Foundation'
              echo 'enum Secrets {'
              echo "    static let geminiClientID = \"${GEMINI_CLIENT_ID}\""
              echo "    static let geminiClientSecret = \"${GEMINI_CLIENT_SECRET}\""
              echo '}'
            } > Sources/UsageMeter/Secrets.swift
            echo "Injected Gemini OAuth client from secrets"
          else
            cp Secrets.example.swift Sources/UsageMeter/Secrets.swift
            echo "WARNING: Gemini secrets missing; using example placeholders"
          fi

      - name: Import Apple certificate (optional)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]; then
            echo "No BUILD_CERTIFICATE_BASE64 — skip Developer ID import"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "${KEYCHAIN_PASSWORD:-ci}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD:-ci}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${P12_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Package DMG
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          ./make-dmg.sh
          ls -la UsageMeter-*.dmg

      - name: Notarize (optional)
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_BASE64:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "Notarization secrets missing — skip"
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          DMG="UsageMeter-${VERSION}.dmg"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Generate appcast (signed; hard-fails without key)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set — refusing to publish an unsigned appcast (existing installs would reject the update)"
            exit 1
          fi
          mkdir -p secrets
          printf '%s' "$SPARKLE_PRIVATE_KEY" > secrets/sparkle_ed_private.key
          # Sparkle CLI tools (sign_update / generate_appcast) live in the SwiftPM
          # artifacts dir that package.sh already populated via make-dmg.sh.
          DMG="UsageMeter-${VERSION}.dmg"
          REQUIRE_ED_SIGNATURE=1 ./scripts/generate-appcast.sh "$DMG"
          # generate_appcast 輸出元素格式,手寫 fallback 是屬性格式 — 兩種都接受
          grep -q 'sparkle:edSignature="' appcast/appcast.xml
          grep -Eq "sparkle:version=\"${BUILD_NUMBER}\"|<sparkle:version>${BUILD_NUMBER}</sparkle:version>" appcast/appcast.xml
          grep -q "UsageMeter-${VERSION}.dmg" appcast/appcast.xml
          echo "appcast OK: version ${VERSION}, build ${BUILD_NUMBER}, signed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsageMeter-${{ github.ref_name }}
          path: |
            UsageMeter-*.dmg
            appcast/appcast.xml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG="UsageMeter-${VERSION}.dmg"
          NOTES="See CHANGELOG.md. Gatekeeper: Privacy & Security → Open Anyway until notarized."
          FILES=("$DMG" appcast/appcast.xml)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${FILES[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${FILES[@]}" --title "UsageMeter $GITHUB_REF_NAME" --notes "$NOTES"
          fi

      - name: Commit appcast to main
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp appcast/appcast.xml /tmp/appcast-new.xml
          git fetch origin main
          git checkout -B appcast-bot origin/main
          mkdir -p appcast
          cp /tmp/appcast-new.xml appcast/appcast.xml
          git add appcast/appcast.xml
          if git diff --staged --quiet; then
            echo "appcast unchanged"
          else
            git commit -m "chore: update Sparkle appcast for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
